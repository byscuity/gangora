<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hexágono Sincronizado - Pico da Gangorra em Cada Lado</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', monospace;
        }

        canvas {
            display: block;
            margin: 0 auto;
            background: #000000;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.15);
            border-radius: 4px;
        }

        .info {
            position: fixed;
            bottom: 12px;
            right: 12px;
            color: #ffaa66;
            font-size: 9px;
            font-family: 'Courier New', monospace;
            background: rgba(0,0,0,0.7);
            padding: 4px 10px;
            border-radius: 16px;
            backdrop-filter: blur(2px);
            pointer-events: none;
            letter-spacing: 0.5px;
            font-weight: bold;
        }
        
        .badge {
            position: fixed;
            bottom: 12px;
            left: 12px;
            color: #88ffcc;
            font-size: 8px;
            font-family: monospace;
            background: rgba(0,0,0,0.6);
            padding: 3px 10px;
            border-radius: 14px;
            pointer-events: none;
            font-weight: 500;
        }
        
        .sync-tag {
            position: fixed;
            top: 12px;
            right: 12px;
            color: #ffaa88;
            font-size: 9px;
            font-family: monospace;
            background: rgba(0,0,0,0.7);
            padding: 4px 12px;
            border-radius: 20px;
            pointer-events: none;
            backdrop-filter: blur(2px);
            font-weight: bold;
        }
    </style>
</head>
<body>
<canvas id="canvas" width="1000" height="500"></canvas>
<div class="info">🔺 HEXÁGONO SINCRONIZADO | SEMPRE NO PICO DA GANGORRA | IDA E VOLTA PERFEITA 🔺</div>
<div class="badge">⟁ movimento harmônico | extremidades sempre no alto | loop contínuo</div>
<div class="sync-tag">⚡ PICO → PICO | ACIMA DA LINHA ⚡</div>

<script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // DIMENSÕES FIXAS
        const W = 1000;
        const H = 500;
        canvas.width = W;
        canvas.height = H;

        // PONTO CENTRAL DA GANGORRA (pivô)
        const pivotX = W / 2;
        const pivotY = H / 2;
        
        // COMPRIMENTO TOTAL DA LINHA
        const lineLength = 480;
        const halfLen = lineLength / 2;   // 240 pixels do centro até cada ponta
        
        // ========== PARÂMETROS DA GANGORRA ==========
        const angularSpeed = 1.85;        // rad/s (velocidade angular da oscilação)
        const tiltAmplitude = 0.44;       // radianos (~25 graus de inclinação máxima)
        
        // ========== PARÂMETROS DO HEXÁGONO ==========
        const hexRadius = 22;
        const perpendicularOffset = 20;    // distância ACIMA da linha (sempre acima)
        const hexSpinRate = 5.2;           // giro próprio (visual, rápido)
        
        // ================================================================
        // LÓGICA PRINCIPAL - Sincronização perfeita com a altura da gangorra
        // ================================================================
        // Para que o hexágono chegue SEMPRE na parte mais alta da linha 
        // (independente do lado - esquerdo ou direito), o movimento dele
        // ao longo da linha deve seguir uma função harmônica SIMPLES,
        // EXATAMENTE como a oscilação angular da gangorra, porém aplicada
        // à posição linear.
        //
        // A gangorra inclina conforme: θ(t) = A * sin(ω * t)
        // O ponto mais alto em cada extremidade ocorre quando a linha está
        // com inclinação máxima (θ = +A ou θ = -A). Nesses momentos,
        // uma das pontas está no topo (Y mínimo) e a outra na base.
        //
        // Para o hexágono estar sempre no PICO (parte mais alta) em CADA lado,
        // a posição dele ao longo da linha deve variar de -halfLen a +halfLen
        // de forma que esteja na extremidade ESQUERDA (-halfLen) exatamente quando
        // a inclinação é máxima positiva (ponta esquerda no alto) E também na 
        // extremidade DIREITA (+halfLen) quando a inclinação é máxima negativa
        // (ponta direita no alto). Ou seja, posição e inclinação devem estar
        // em quadratura ou defasagem adequada.
        //
        // SOLUÇÃO MATEMÁTICA PERFEITA:
        // Definimos a posição do hexágono como: s(t) = halfLen * sin(ω * t + φ)
        // Precisamos que s(t) atinja -halfLen quando θ(t) = +A (esquerda alta)
        // e s(t) atinja +halfLen quando θ(t) = -A (direita alta).
        // Com θ(t) = A * sin(ωt), o pico positivo (+A) ocorre em ωt = π/2.
        // O pico negativo (-A) ocorre em ωt = 3π/2.
        // Para s(t) = halfLen * sin(ωt), teríamos s=+halfLen em ωt=π/2 (direita alta)
        // e s=-halfLen em ωt=3π/2 (esquerda alta) -> isso faz o hexágono estar na 
        // extremidade oposta ao pico. Invertendo o sinal: s(t) = -halfLen * sin(ωt)
        // resulta em s = -halfLen em ωt=π/2 (esquerda alta) e s = +halfLen em ωt=3π/2
        // (direita alta). EXATAMENTE o que queremos!
        //
        // Portanto: POSIÇÃO HEXÁGONO = -halfLen * sin(ωt)
        // Isso garante que o hexágono chega no pico esquerdo quando a gangorra
        // está com inclinação máxima positiva, e no pico direito quando a gangorra
        // está com inclinação máxima negativa. A velocidade é perfeitamente variável
        // (mais rápida no centro, mais lenta nos extremos), mas o efeito visual é
        // que o hexágono "sobe" até o topo de cada lado sincronizadamente.
        //
        // O ciclo se repete: sobe lado esquerdo -> desce -> sobe lado direito -> desce...
        // Ele sempre alcança a parte mais alta DE CADA LADO no momento exato em que
        // aquela extremidade está no ponto mais alto da oscilação.
        // ================================================================
        
        // Estado da animação
        let lastTimestamp = null;
        let globalTime = 0;
        let animationId = null;
        
        // Ângulo atual da gangorra
        let currentTiltAngle = 0;
        // Posição do hexágono ao longo da linha (entre -halfLen e +halfLen)
        let posAlongLine = 0;
        // Rotação própria do hexágono
        let hexSpinAngle = 0;
        
        // ========== FUNÇÕES GEOMÉTRICAS ==========
        
        /**
         * Desenha a linha da gangorra com traço limpo
         */
        function drawGangorraLine(angleRad) {
            const cosA = Math.cos(angleRad);
            const sinA = Math.sin(angleRad);
            const dx = halfLen * cosA;
            const dy = halfLen * sinA;
            
            const x1 = pivotX - dx;
            const y1 = pivotY - dy;
            const x2 = pivotX + dx;
            const y2 = pivotY + dy;
            
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = '#FFFFFF';
            ctx.lineWidth = 3.2;
            ctx.stroke();
            
            // Extremidades com leve destaque
            ctx.beginPath();
            ctx.arc(x1, y1, 2.5, 0, Math.PI * 2);
            ctx.fillStyle = '#dddddd';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x2, y2, 2.5, 0, Math.PI * 2);
            ctx.fill();
            
            // Pivô central
            ctx.beginPath();
            ctx.arc(pivotX, pivotY, 2.2, 0, Math.PI * 2);
            ctx.fillStyle = '#cccccc';
            ctx.fill();
        }
        
        /**
         * Retorna ponto sobre a linha dado parâmetro s (distância do centro)
         */
        function getPointOnLine(s, angleRad) {
            const dirX = Math.cos(angleRad);
            const dirY = Math.sin(angleRad);
            return {
                x: pivotX + s * dirX,
                y: pivotY + s * dirY
            };
        }
        
        /**
         * Calcula posição ACIMA da linha (offset perpendicular)
         * Mantém hexágono sempre sobre a linha, nunca dentro
         */
        function getAbovePoint(basePoint, angleRad, offset) {
            // Vetor normal que aponta para o lado "acima" (visualmente superior)
            const normX = Math.sin(angleRad);
            const normY = -Math.cos(angleRad);
            return {
                x: basePoint.x + normX * offset,
                y: basePoint.y + normY * offset
            };
        }
        
        /**
         * Desenha hexágono com rotação própria e alinhamento com a linha
         */
        function drawHexagon(cx, cy, radius, lineAngle, selfRot) {
            const totalRotation = lineAngle + selfRot;
            const sides = 6;
            ctx.beginPath();
            for (let i = 0; i < sides; i++) {
                const angleStep = (i * Math.PI * 2 / sides) + totalRotation;
                const x = cx + radius * Math.cos(angleStep);
                const y = cy + radius * Math.sin(angleStep);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.fillStyle = '#FFFFFF';
            ctx.fill();
            ctx.strokeStyle = '#444444';
            ctx.lineWidth = 0.8;
            ctx.stroke();
            
            // Pequeno centro brilhante para efeito
            ctx.beginPath();
            ctx.arc(cx, cy, 3, 0, Math.PI * 2);
            ctx.fillStyle = '#ffcc55';
            ctx.shadowBlur = 4;
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        /**
         * Atualiza a posição do hexágono usando função harmônica PERFEITAMENTE SINCRONIZADA
         * com a gangorra: posAlongLine = -halfLen * sin(ω * t)
         * 
         * Isso garante:
         * - Quando a gangorra está com inclinação máxima positiva (ponta esquerda no alto),
         *   sin(ωt) = 1 → posAlongLine = -halfLen (extremidade esquerda - PICO DO LADO ESQUERDO)
         * - Quando a gangorra está com inclinação máxima negativa (ponta direita no alto),
         *   sin(ωt) = -1 → posAlongLine = +halfLen (extremidade direita - PICO DO LADO DIREITO)
         * - Quando a gangorra está na horizontal (θ=0), sin(ωt)=0 → posAlongLine = 0 (centro)
         * 
         * O hexágono chega SEMPRE na parte mais alta de CADA extremidade no momento exato
         * em que a gangorra está na inclinação máxima daquele lado.
         */
        function updateSynchronizedPosition(omega, timeSec) {
            // Função harmônica pura: s(t) = -halfLen * sin(ω * t)
            // O sinal negativo garante que os picos estejam alinhados com os lados corretos
            const sinVal = Math.sin(omega * timeSec);
            posAlongLine = -halfLen * sinVal;
            
            // Garantia numérica (já está dentro dos limites por natureza)
            posAlongLine = Math.min(halfLen, Math.max(-halfLen, posAlongLine));
        }
        
        /**
         * Loop principal de animação
         */
        function animationLoop(nowMs) {
            if (!lastTimestamp) {
                lastTimestamp = nowMs;
                globalTime = 0;
                requestAnimationFrame(animationLoop);
                return;
            }
            
            // Delta time para rotação própria e controle (delta pequeno)
            let delta = Math.min(0.033, (nowMs - lastTimestamp) / 1000);
            if (delta <= 0) delta = 0.016;
            lastTimestamp = nowMs;
            
            // Tempo global acumulado
            globalTime += delta;
            
            // 1. Atualiza ângulo da gangorra (oscilação)
            currentTiltAngle = tiltAmplitude * Math.sin(angularSpeed * globalTime);
            
            // 2. Atualiza posição do hexágono usando a função sincronizada PERFEITA
            //    A posição é calculada diretamente pela fórmula harmônica, sem depender
            //    de velocidade, garantindo que nos picos da gangorra o hexágono esteja
            //    exatamente nas extremidades.
            updateSynchronizedPosition(angularSpeed, globalTime);
            
            // 3. Atualiza rotação própria (giro visual contínuo)
            hexSpinAngle = hexSpinRate * globalTime;
            
            // 4. Ponto base sobre a linha na posição atual
            const basePt = getPointOnLine(posAlongLine, currentTiltAngle);
            
            // 5. Posição do hexágono com offset perpendicular (sempre ACIMA)
            const hexagonCenter = getAbovePoint(basePt, currentTiltAngle, perpendicularOffset);
            
            // 6. RENDERIZAÇÃO
            ctx.clearRect(0, 0, W, H);
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, W, H);
            
            // Desenha a linha branca (gangorra)
            drawGangorraLine(currentTiltAngle);
            
            // Desenha o hexágono acima da linha, sincronizado com os picos
            drawHexagon(hexagonCenter.x, hexagonCenter.y, hexRadius, currentTiltAngle, hexSpinAngle);
            
            // Opcional: pequeno indicador de altura da extremidade (apenas visual)
            // Não interfere na lógica principal
            
            animationId = requestAnimationFrame(animationLoop);
        }
        
        // Inicialização
        function startAnimation() {
            if (animationId) cancelAnimationFrame(animationId);
            lastTimestamp = null;
            globalTime = 0;
            posAlongLine = -halfLen; // começa na esquerda (pico inicial)
            currentTiltAngle = tiltAmplitude; // começa na inclinação máxima positiva
            hexSpinAngle = 0;
            animationId = requestAnimationFrame(animationLoop);
        }
        
        startAnimation();
        
        // Eventos de prevenção
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());
        canvas.addEventListener('selectstart', (e) => e.preventDefault());
        
        window.addEventListener('beforeunload', () => {
            if (animationId) cancelAnimationFrame(animationId);
        });
        
        // Console com informações da sincronização perfeita
        console.log('═══════════════════════════════════════════════════════');
        console.log('🔺 HEXÁGONO PERFEITAMENTE SINCRONIZADO COM OS PICOS DA GANGORRA');
        console.log('📐 Função de posição: s(t) = -halfLen * sin(ω * t)');
        console.log('📍 Pico esquerdo (mais alto): quando θ = +' + tiltAmplitude.toFixed(3) + ' rad → s = -' + halfLen + ' px');
        console.log('📍 Pico direito (mais alto): quando θ = -' + tiltAmplitude.toFixed(3) + ' rad → s = +' + halfLen + ' px');
        console.log('⚡ O hexágono chega SEMPRE na parte mais alta da linha em CADA lado!');
        console.log('🔄 Movimento: sobe lado esquerdo → desce pelo centro → sobe lado direito → desce → repete');
        console.log('🎯 Velocidade angular da gangorra: ' + angularSpeed + ' rad/s');
        console.log('💫 Giro próprio do hexágono: ' + hexSpinRate + ' rad/s');
        console.log('📏 Offset acima da linha: ' + perpendicularOffset + ' pixels');
        console.log('═══════════════════════════════════════════════════════');
        
        // Adiciona um estilo sutil para melhor visualização
        const style = document.createElement('style');
        style.textContent = `
            canvas {
                transition: filter 0.3s;
            }
            canvas:hover {
                filter: drop-shadow(0 0 5px rgba(255,200,80,0.25));
            }
        `;
        document.head.appendChild(style);
        
        // Pequena anotação visual via canvas adicional? (não necessário)
        // Tudo pronto: hexágono sempre atinge o ponto mais alto em ambos os lados.
    })();
</script>
</body>
</html>
