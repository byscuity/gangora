<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hexágono Giratório Sobre Linha Gangorra</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            /* Sem sombras, sem brilhos, sem efeitos extras */
        }

        body {
            background: black;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        canvas {
            display: block;
            margin: 0 auto;
            box-shadow: none;
            border: none;
            outline: none;
            /* Garantia: sem brilho, sem sombra */
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script>
        (function() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');

            // Dimensões responsivas mas com proporção fixa para manter a linha visível
            function setCanvasSize() {
                const containerWidth = window.innerWidth;
                const containerHeight = window.innerHeight;
                // Tamanho base: 800x400, mas adapta para telas menores mantendo proporção
                let width = Math.min(containerWidth - 40, 900);
                let height = Math.min(containerHeight - 40, 450);
                // Proporção largura/altura aproximadamente 2:1 para a linha ter espaço horizontal
                if (width / height > 2.2) {
                    width = height * 2.2;
                } else if (height / width > 0.6) {
                    height = width * 0.55;
                }
                canvas.width = width;
                canvas.height = height;
            }
            setCanvasSize();
            window.addEventListener('resize', () => {
                setCanvasSize();
            });

            // ---------- Parâmetros da linha "gangorra" (onda suave senoidal) ----------
            // A linha será uma curva suave parecendo uma gangorra: dois pontos fixos nas extremidades,
            // mas com um deslocamento vertical senoidal no meio, simulando movimento.
            // Em vez de uma linha reta rígida, usamos uma curva bezier quadrática ou cúbica,
            // com o ponto de controle oscilando para cima/baixo como uma gangorra.
            // Isso mantém a linha branca e sem adicionar objetos extras.
            
            // Definição dos pontos fixos (x, y) relativos ao canvas
            let leftPoint = { x: 40, y: 0 };    // y será ajustado dinamicamente
            let rightPoint = { x: 0, y: 0 };
            
            // Ponto de controle para a curva (gangorra): sobe e desce como uma gangorra.
            let controlYOffset = 0;
            let time = 0;
            const GANGORRA_SPEED = 1.8; // velocidade da gangorra (ondulação)
            
            // Parâmetros do hexágono
            let hexX = 0;        // posição ao longo da linha (0 = extremidade esquerda, 1 = direita)
            let hexDirection = 1; // 1 = indo para direita, -1 = esquerda
            const HEX_SPEED = 0.0035; // velocidade de movimento (por frame, relativo à largura total)
            let hexAngle = 0;     // ângulo de rotação do hexágono (radianos)
            const HEX_ROTATION_SPEED = 0.025; // rotação constante
            
            // Raio do hexágono (tamanho)
            let hexRadius = 22;
            
            // Função que atualiza a geometria da linha dependendo do tamanho do canvas
            function updateGeometry() {
                const marginX = Math.min(45, canvas.width * 0.07);
                const bottomMargin = canvas.height * 0.2;
                const topBaseY = canvas.height * 0.65;  // altura base da linha (ponto médio)
                leftPoint.x = marginX;
                rightPoint.x = canvas.width - marginX;
                // Os pontos fixos das extremidades terão a mesma altura base para a linha plana,
                // mas a gangorra será aplicada através do ponto de controle.
                leftPoint.y = topBaseY;
                rightPoint.y = topBaseY;
                // Ajustar raio do hexágono proporcional
                hexRadius = Math.min(24, canvas.width * 0.045, canvas.height * 0.1);
                hexRadius = Math.max(14, hexRadius);
            }
            
            // Função que retorna a coordenada Y da linha curva (gangorra) em um dado X
            // Usamos uma interpolação de curva quadrática: ponto de controle (midX, controlY)
            // Isso cria um arco suave que lembra o movimento de gangorra.
            // O ponto de controle oscila para cima e para baixo no centro.
            function getLineY(x, controlY) {
                // x entre leftPoint.x e rightPoint.x
                const t = (x - leftPoint.x) / (rightPoint.x - leftPoint.x);
                if (t < 0) return leftPoint.y;
                if (t > 1) return rightPoint.y;
                // Curva quadrática: B(t) = (1-t)^2 * P0 + 2(1-t)t * P1 + t^2 * P2
                const P0x = leftPoint.x, P0y = leftPoint.y;
                const P2x = rightPoint.x, P2y = rightPoint.y;
                const P1x = leftPoint.x + (rightPoint.x - leftPoint.x) * 0.5;
                const P1y = controlY;
                
                // interpolação para Y
                const y = (1-t)*(1-t)*P0y + 2*(1-t)*t*P1y + t*t*P2y;
                return y;
            }
            
            // Obtém o ponto exato (x,y) sobre a curva gangorra para um dado parâmetro t (0=esquerda, 1=direita)
            function getPointOnLine(t, controlY) {
                const x = leftPoint.x + t * (rightPoint.x - leftPoint.x);
                const y = getLineY(x, controlY);
                return { x, y };
            }
            
            // Desenha o hexágono branco puro, rotacionado, sem bordas extras, sem brilho.
            function drawHexagon(x, y, radius, angle) {
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(angle);
                ctx.beginPath();
                for (let i = 0; i < 6; i++) {
                    const theta = i * Math.PI * 2 / 6;
                    const px = radius * Math.cos(theta);
                    const py = radius * Math.sin(theta);
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.fillStyle = 'white';
                ctx.fill();
                // Nenhum traço de borda adicional, sem gradiente, sem brilho
                ctx.restore();
            }
            
            // Desenha a linha branca reta com movimento de gangorra: usa curva suave entre os pontos.
            // Para garantir que parece uma linha "reta" mas ondulando como gangorra, usamos uma curva quadrática
            // com apenas um pico suave. A linha é branca, sólida, sem pontos extras.
            function drawGangorraLine(controlY) {
                ctx.beginPath();
                // move para ponto esquerdo
                ctx.moveTo(leftPoint.x, leftPoint.y);
                // desenha uma curva quadrática até o ponto direito, com controle no meio
                const midX = leftPoint.x + (rightPoint.x - leftPoint.x) * 0.5;
                ctx.quadraticCurveTo(midX, controlY, rightPoint.x, rightPoint.y);
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 3.5;
                ctx.stroke();
                // Sem nenhum outro elemento, sem bolinhas, sem retas adicionais.
            }
            
            // Função que atualiza a animação e desenha tudo
            function animate() {
                // Atualizar geometria em caso de redimensionamento já tratado, mas também durante animação
                // para segurança se redimensionou em outro momento.
                // Aqui nós garantimos que geometria está de acordo com o canvas atual.
                updateGeometry();
                
                // Atualiza o tempo da gangorra
                time += GANGORRA_SPEED * 0.016; // ajuste suave independente do frame (aproximado)
                // Efeito gangorra: o controlY oscila para cima e para baixo em relação à linha reta base.
                // A base dos pontos extremos está em leftPoint.y e rightPoint.y (mesmo Y)
                // O ponto de controle oscila entre -35 e +35 pixels de deslocamento vertical em relação à linha reta imaginária.
                const maxOffset = Math.min(38, canvas.height * 0.12);
                const offsetY = Math.sin(time) * maxOffset;
                // o controlY é a altura do ponto médio do controle
                const baseMidY = (leftPoint.y + rightPoint.y) / 2;
                let controlY = baseMidY + offsetY;
                // limitar para não sair muito da tela
                controlY = Math.min(canvas.height - 15, Math.max(15, controlY));
                
                // Atualiza movimento do hexágono de uma ponta a outra da linha
                hexX += HEX_SPEED * hexDirection;
                if (hexX >= 1.0) {
                    hexX = 1.0;
                    hexDirection = -1;
                } else if (hexX <= 0.0) {
                    hexX = 0.0;
                    hexDirection = 1;
                }
                
                // Atualiza rotação do hexágono (gira continuamente)
                hexAngle += HEX_ROTATION_SPEED;
                // normaliza ângulo não necessário mas mantém
                if (hexAngle > Math.PI * 2) hexAngle -= Math.PI * 2;
                
                // Obtém a posição exata do hexágono sobre a linha curva atual (gangorra)
                const hexPos = getPointOnLine(hexX, controlY);
                
                // Desenha tudo
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'black';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Desenha a linha branca com movimento de gangorra
                drawGangorraLine(controlY);
                
                // Desenha o hexágono branco girando sobre a linha (sem bordas, sem sombra, apenas preenchido)
                drawHexagon(hexPos.x, hexPos.y, hexRadius, hexAngle);
                
                // Nada mais: sem bolinhas, sem retas adicionais, sem brilho, sem luz, sem sombra.
                requestAnimationFrame(animate);
            }
            
            // Para garantir que tudo funcione com redimensionamento sem sobrescrever dimensões desagradáveis
            window.addEventListener('resize', () => {
                setCanvasSize();
                updateGeometry();
                // Reseta pequenos valores para evitar posições fora do limite, mas mantém movimento contínuo
                // Não interferir na direção do hexágono para não quebrar continuidade.
                if (hexX > 1) hexX = 1;
                if (hexX < 0) hexX = 0;
            });
            
            // Inicializa geometria e começa animação
            updateGeometry();
            // Inicializa hexX no centro ou ponta? Para maior fluidez começa na ponta esquerda.
            hexX = 0;
            hexDirection = 1;
            hexAngle = 0;
            animate();
        })();
    </script>
</body>
</html>
