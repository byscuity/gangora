<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hexágono no Ponto Mais Alto da Gangorra</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            margin: 0 auto;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.05);
            background: #000000;
        }

        .info {
            position: fixed;
            bottom: 8px;
            right: 8px;
            color: #111;
            font-size: 8px;
            font-family: monospace;
            pointer-events: none;
        }
    </style>
</head>
<body>
<canvas id="canvas" width="1000" height="500"></canvas>
<div class="info">▲ hexágono na ponta mais alta | percorre a linha até o topo ▲</div>

<script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Dimensões fixas
        const W = 1000;
        const H = 500;
        canvas.width = W;
        canvas.height = H;

        // Centro da linha (ponto médio fixo onde a gangorra pivoteia)
        const centerX = W / 2;
        const centerY = H / 2;
        
        // Comprimento da linha reta (branca)
        const lineLength = 460;
        const halfLen = lineLength / 2;
        
        // PARÂMETROS DO MOVIMENTO DA GANGORRA
        const gangSpeed = 1.8;           // velocidade angular da gangorra (rad/s)
        const amplitudeAngle = 0.48;      // amplitude de inclinação (~27.5 graus)
        
        // PARÂMETROS DO HEXÁGONO
        const hexSize = 22;               // raio do hexágono
        const hexSpinSpeed = 2.5;         // rotação própria (rad/s)
        
        // AJUSTE VERTICAL: distância que o hexágono fica ACIMA da linha
        // Para garantir que o hexágono esteja sempre visivelmente acima, sem tocar ou entrar na linha
        const aboveOffset = 18;            // pixels acima da linha (perpendicular)
        
        // NOVA LÓGICA: o hexágono precisa ficar na ponta mais alta da linha,
        // mas precisa percorrer a linha para o ponto mais alto dela.
        // Interpretação: A linha-gangorra tem duas pontas. A ponta MAIS ALTA é aquela com maior coordenada Y
        // (considerando o sistema de coordenadas onde Y aumenta para baixo, o "mais alto" é o menor Y).
        // Porém, para ser visualmente claro: a ponta que está com o menor valor de Y (mais acima na tela)
        // é a ponta esquerda ou direita dependendo da inclinação.
        // O hexágono deve se mover continuamente ao longo da linha, mas sempre posicionado na extremidade
        // que estiver mais alta (a ponta elevada da gangorra).
        // E o movimento de percorrer a linha até o ponto mais alto significa que ele transita suavemente
        // de uma ponta à outra, sempre indo em direção à ponta mais alta atual.
        // Para isso, implementamos um sistema onde o hexágono "escala" a linha dinamicamente,
        // movendo-se para a extremidade com maior altura (menor Y) a cada instante.
        // A velocidade de movimento é controlada para ser suave, inevitavelmente percorrendo a linha.
        
        // Estratégia:
        // Identificamos as duas extremidades da linha: leftEnd e rightEnd (em coordenadas do mundo)
        // Determinamos qual delas tem o menor Y (mais alta).
        // O hexágono se move continuamente em direção àquela extremidade, com velocidade constante
        // ao longo da linha (no espaço paramétrico s, onde s=-halfLen é ponta esquerda, s=+halfLen é ponta direita).
        // Quando alcança a ponta mais alta, ele imediatamente começa a se mover em direção à outra ponta,
        // que se tornará a mais alta conforme a gangorra oscila? Não exato, com a gangorra oscilando,
        // a ponta mais alta alterna. O hexágono deve "perseguir" a ponta mais alta continuamente,
        // percorrendo a linha para lá. Isso cria um movimento fluido onde o hexágono sempre está
        // subindo em direção à região mais elevada.
        
        // Posição atual do hexágono ao longo da linha (parâmetro s entre -halfLen e halfLen)
        let currentS = 0;                // começa no centro
        
        // Velocidade de percurso ao longo da linha (pixels por segundo) - controla quão rápido ele anda
        // Deve ser suficiente para acompanhar a mudança da ponta mais alta sem atrasos extremos,
        // mas sem ultrapassar a dinâmica. Escolhemos velocidade que permite movimento responsivo.
        const travelSpeed = 210;          // pixels/segundo ao longo da linha
        
        // Variáveis de tempo para movimento contínuo
        let lastTimestamp = null;
        let elapsedGlobal = 0;
        
        // Estado atual da linha
        let currentAngle = 0;
        
        // Função que calcula as coordenadas das duas extremidades da linha
        function getLineEndpoints(angleRad) {
            const cosA = Math.cos(angleRad);
            const sinA = Math.sin(angleRad);
            const dx = halfLen * cosA;
            const dy = halfLen * sinA;
            return {
                left: { x: centerX - dx, y: centerY - dy, param: -halfLen },
                right: { x: centerX + dx, y: centerY + dy, param: halfLen }
            };
        }
        
        // Retorna qual extremidade está mais alta (menor Y)
        function getHigherEndpoint(angleRad) {
            const ends = getLineEndpoints(angleRad);
            return (ends.left.y < ends.right.y) ? ends.left : ends.right;
        }
        
        // Retorna o parâmetro s da extremidade mais alta
        function getHigherParam(angleRad) {
            const ends = getLineEndpoints(angleRad);
            return (ends.left.y < ends.right.y) ? ends.left.param : ends.right.param;
        }
        
        // Obtém um ponto sobre a linha dado o parâmetro s (distância ao longo do eixo)
        function getPointOnLineByParam(s, angleRad) {
            const dirX = Math.cos(angleRad);
            const dirY = Math.sin(angleRad);
            return {
                x: centerX + s * dirX,
                y: centerY + s * dirY
            };
        }
        
        // Atualiza a posição do hexágono: ele se move continuamente em direção à ponta mais alta
        function updateHexagonPosition(deltaTime, currentAngleRad) {
            if (deltaTime <= 0) return;
            
            const targetParam = getHigherParam(currentAngleRad);
            const diff = targetParam - currentS;
            
            if (Math.abs(diff) < 0.5) {
                // Já está praticamente na ponta mais alta
                currentS = targetParam;
                return;
            }
            
            // Move em direção ao alvo com velocidade limitada
            const step = travelSpeed * deltaTime;
            if (Math.abs(diff) <= step) {
                currentS = targetParam;
            } else {
                currentS += Math.sign(diff) * step;
            }
            
            // Garantir limites (nunca ultrapassar as extremidades)
            currentS = Math.max(-halfLen, Math.min(halfLen, currentS));
        }
        
        // ========== FUNÇÕES DE DESENHO ==========
        
        // Desenha a linha reta (branca) - gangorra
        function drawLine(angleRad) {
            const cosAng = Math.cos(angleRad);
            const sinAng = Math.sin(angleRad);
            const dx = halfLen * cosAng;
            const dy = halfLen * sinAng;
            
            const x1 = centerX - dx;
            const y1 = centerY - dy;
            const x2 = centerX + dx;
            const y2 = centerY + dy;
            
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = '#FFFFFF';
            ctx.lineWidth = 3.0;
            ctx.stroke();
        }
        
        // Obtém a posição do hexágono ACIMA da linha, no ponto perpendicular
        // O hexágono deve ficar "acima" (externo à linha) – como a linha é uma gangorra,
        // o conceito de "acima" é o lado que aponta para fora da superfície.
        // Para uma linha sem espessura, "acima" será perpendicular e para o lado que corresponde
        // ao sentido anti-horário do vetor diretor? Para manter aparência natural,
        // faremos com que o hexágono seja deslocado perpendicularmente à linha,
        // no sentido que aponta para "cima" no espaço da tela misturado com inclinação.
        // Porém, o requisito "hexágono ficar acima da linha" sugere visualmente que ele flutua sobre ela.
        // Escolhemos o vetor normal perpendicular à linha. Direção normal: (-sen(angle), cos(angle))
        // Isso garante que o hexágono esteja do lado "de cima" baseado na orientação dos eixos.
        // Para que ele sempre esteja visível acima (não abaixo), usamos um pequeno ajuste.
        function getPositionAboveLine(basePoint, angleRad, offsetDistance) {
            // Vetor perpendicular (rotacionado 90° anti-horário)
            const perpX = -Math.sin(angleRad);
            const perpY = Math.cos(angleRad);
            return {
                x: basePoint.x + perpX * offsetDistance,
                y: basePoint.y + perpY * offsetDistance
            };
        }
        
        // Desenha hexágono com rotação própria + paralelo à linha
        function drawHexagonAt(cx, cy, radius, baseAngle, selfRotation) {
            const totalRotation = baseAngle + selfRotation;
            ctx.beginPath();
            const sides = 6;
            for (let i = 0; i < sides; i++) {
                const angle = (i * Math.PI * 2 / sides) + totalRotation;
                const x = cx + radius * Math.cos(angle);
                const y = cy + radius * Math.sin(angle);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.fillStyle = '#FFFFFF';
            ctx.fill();
        }
        
        // Atualiza o movimento da gangorra com base no tempo global
        function updateGangorra(seconds) {
            currentAngle = amplitudeAngle * Math.sin(gangSpeed * seconds);
        }
        
        // ========== LOOP PRINCIPAL ==========
        let startTime = null;
        let animFrameId = null;
        let lastFrameTime = 0;
        let globalSeconds = 0;
        
        function renderFrame(nowMs) {
            if (!startTime) {
                startTime = nowMs;
                lastFrameTime = nowMs;
                globalSeconds = 0;
                requestAnimationFrame(renderFrame);
                return;
            }
            
            // Tempo global decorrido (segundos)
            globalSeconds = (nowMs - startTime) / 1000;
            
            // Delta time para movimento suave do hexágono
            let deltaSec = Math.min(0.033, (nowMs - lastFrameTime) / 1000);
            if (deltaSec <= 0) deltaSec = 0.016;
            lastFrameTime = nowMs;
            
            // 1. Atualiza ângulo da gangorra
            updateGangorra(globalSeconds);
            
            // 2. Atualiza posição do hexágono: ele PERCORRE a linha em direção ao ponto mais alto
            updateHexagonPosition(deltaSec, currentAngle);
            
            // 3. Obtém o ponto base na linha (onde o hexágono toca a linha, mas ele ficará acima)
            const basePoint = getPointOnLineByParam(currentS, currentAngle);
            
            // 4. Posição acima da linha com offset vertical (flutuando)
            const hexPos = getPositionAboveLine(basePoint, currentAngle, aboveOffset);
            
            // 5. Rotação do hexágono (gira continuamente)
            const hexSelfRotation = hexSpinSpeed * globalSeconds;
            
            // 6. Desenhar tudo
            ctx.clearRect(0, 0, W, H);
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, W, H);
            
            // Linha branca (gangorra)
            drawLine(currentAngle);
            
            // Hexágono branco, acima da linha, paralelo à linha e girando
            drawHexagonAt(hexPos.x, hexPos.y, hexSize, currentAngle, hexSelfRotation);
            
            // (Opcional: nenhum elemento extra, sem pontos de referência, sem textos)
            
            animFrameId = requestAnimationFrame(renderFrame);
        }
        
        // Iniciar animação
        animFrameId = requestAnimationFrame(renderFrame);
        
        // Prevenir interações indesejadas
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());
        canvas.addEventListener('selectstart', (e) => e.preventDefault());
        
        // Cleanup (não crítico)
        window.addEventListener('beforeunload', () => {
            if (animFrameId) cancelAnimationFrame(animFrameId);
        });
        
        console.log('✓ Hexágono persegue a ponta mais alta da gangorra | flutua acima da linha');
        
    })();
</script>
</body>
</html>
