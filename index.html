<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gangorra Hexagonal - Paralelo à Linha</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, 'Segoe UI', monospace;
        }

        canvas {
            display: block;
            margin: 0 auto;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.03);
            background: #000000;
        }

        .info {
            position: fixed;
            bottom: 10px;
            right: 10px;
            color: #1a1a1a;
            font-size: 9px;
            background: transparent;
            pointer-events: none;
            font-family: monospace;
        }
    </style>
</head>
<body>
<canvas id="canvas" width="1000" height="500"></canvas>
<div class="info">⚡ linha-gangorra | hexágono paralelo e sobreposto ⚡</div>

<script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Dimensões fixas
        const W = 1000;
        const H = 500;
        canvas.width = W;
        canvas.height = H;

        // Centro da linha (ponto médio fixo onde a gangorra pivoteia)
        const centerX = W / 2;
        const centerY = H / 2;
        
        // Comprimento da linha reta (branca)
        const lineLength = 480;
        const halfLen = lineLength / 2;
        
        // PARÂMETROS DO MOVIMENTO DA GANGORRA (linha reta inclinando)
        // A linha inteira rotaciona em torno do seu centro como uma gangorra
        const gangSpeed = 1.95;           // velocidade angular da gangorra (rad/s) - mais rápida
        const amplitudeAngle = 0.42;       // amplitude de inclinação (~24 graus)
        
        // PARÂMETROS DO HEXÁGONO
        const hexSize = 24;                // raio do hexágono (distância centro ao vértice)
        const hexSpinSpeed = 2.8;          // rotação própria do hexágono (rad/s) - gira continuamente
        
        // POSIÇÃO RELATIVA DO HEXÁGONO SOBRE A LINHA
        // O hexágono percorre a linha de uma extremidade à outra, sempre paralelo à linha
        // A velocidade translacional é perfeitamente sincronizada com o movimento da gangorra
        // para que NÃO seja mais rápida nem mais devagar que a velocidade da linha.
        // Usamos movimento harmônico com a MESMA frequência angular da gangorra,
        // garantindo que o hexágono atinge os extremos exatamente quando a linha está no máximo ângulo,
        // e cruza o centro quando a linha está na horizontal.
        // Isso faz com que a velocidade do hexágono (derivada da posição) seja naturalmente compatível
        // com o movimento oscilatório da linha, sem ultrapassar ou ficar para trás.
        
        // A posição relativa varia de -halfLen a +halfLen
        // relativePos(t) = halfLen * sin(gangSpeed * t)
        // Fase zero: começa no centro (t=0) e se move para a direita.
        
        // Variáveis de tempo
        let startTime = null;
        let animationId = null;
        
        // Estado atual
        let currentAngle = 0;          // ângulo de inclinação da linha (gangorra)
        let relativePos = 0;           // posição do hexágono ao longo da linha (pixels a partir do centro)
        let hexRotation = 0;            // rotação intrínseca do hexágono (gira sobre si mesmo)
        
        // ========== FUNÇÕES GEOMÉTRICAS ==========
        
        // Desenha a linha reta (branca) - sem nenhum enfeite, sem corda, sem nós
        function drawLine(angleRad) {
            const cosAng = Math.cos(angleRad);
            const sinAng = Math.sin(angleRad);
            
            // Extremidades da linha baseadas no centro e inclinação
            const dx = halfLen * cosAng;
            const dy = halfLen * sinAng;
            
            const x1 = centerX - dx;
            const y1 = centerY - dy;
            const x2 = centerX + dx;
            const y2 = centerY + dy;
            
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = '#FFFFFF';
            ctx.lineWidth = 3.0;
            ctx.stroke();
        }
        
        // Obtém as coordenadas do ponto sobre a linha para uma dada posição relativa
        function getPointOnLine(relPos, angleRad) {
            const dirX = Math.cos(angleRad);
            const dirY = Math.sin(angleRad);
            return {
                x: centerX + relPos * dirX,
                y: centerY + relPos * dirY
            };
        }
        
        // Desenha o hexágono branco, com ORIENTAÇÃO PARALELA À LINHA
        // Isso significa que o hexágono tem seu sistema de coordenadas rotacionado para alinhar
        // com o ângulo da linha. Além disso, ele gira sobre seu próprio eixo (rotação adicional)
        // conforme solicitado: "hexágono branco girando" + "de forma paralela em cima da linha reta"
        // Portanto: orientação base = angleRad (paralelo à linha) + rotação própria (hexRotation)
        function drawHexagonParallel(cx, cy, radius, baseAngle, selfRotation) {
            // O hexágono fica paralelo à linha: um dos eixos principais alinhado com a direção da linha.
            // Isso é conseguido aplicando baseAngle como rotação adicional.
            // A rotação total do hexágono = baseAngle (para ficar paralelo à linha) + selfRotation (girando)
            const totalRotation = baseAngle + selfRotation;
            
            ctx.beginPath();
            const sides = 6;
            for (let i = 0; i < sides; i++) {
                // ângulo de cada vértice no hexágono regular (orientação inicial: um vértice apontando para 0°)
                // Para ficar com um lado paralelo à linha, poderíamos rotacionar 30°, mas qualquer orientação
                // continua sendo paralelo pois o hexágono todo é rotacionado por baseAngle.
                // Usamos ângulo normal (sem offset extra) para garantir a forma simétrica.
                const vertexAngle = (i * Math.PI * 2 / sides) + totalRotation;
                const x = cx + radius * Math.cos(vertexAngle);
                const y = cy + radius * Math.sin(vertexAngle);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.fillStyle = '#FFFFFF';
            ctx.fill();
            // sem traço, sem borda, sem efeitos
        }
        
        // ATUALIZAÇÃO DO MOVIMENTO SINCronizado
        // O hexágono caminha sobre a linha com a VELOCIDADE NECESSÁRIA PARA NÃO ULTRAPASSAR
        // Nossa solução: utiliza a mesma função harmônica que descreve a inclinação da gangorra,
        // porém aplicada à posição linear. Isso garante que a velocidade translacional do hexágono
        // nunca seja maior que a velocidade dos pontos extremos da linha, mantendo sincronia perfeita.
        // Além disso, o hexágono não entra dentro da linha (está sobre ela) e não passa da linha
        // porque a posição relativa fica estritamente entre -halfLen e +halfLen.
        function updateMotion(seconds) {
            // Ângulo da linha (gangorra) - movimento oscilatório rápido
            currentAngle = amplitudeAngle * Math.sin(gangSpeed * seconds);
            
            // POSIÇÃO RELATIVA DO HEXÁGONO SOBRE A LINHA:
            // Usamos a MESMA frequência angular (gangSpeed) para que o movimento linear acompanhe
            // o ritmo da gangorra. Isso significa que quando a linha atinge sua inclinação máxima,
            // o hexágono está nos extremos (relativePos = ±halfLen), e quando a linha está horizontal,
            // o hexágono cruza o centro (relativePos = 0). Desta forma a velocidade translacional
            // do hexágono é naturalmente compatível com a dinâmica da linha.
            relativePos = halfLen * Math.sin(gangSpeed * seconds);
            
            // Rotação intrínseca do hexágono (gira continuamente sobre si mesmo)
            hexRotation = hexSpinSpeed * seconds;
        }
        
        // Função principal de desenho
        function drawFrame(seconds) {
            if (!ctx) return;
            
            // Limpa o fundo (preto puro)
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, W, H);
            
            // Atualiza posições com base no tempo decorrido
            updateMotion(seconds);
            
            // 1. Desenha a LINHA RETA (gangorra) - branca, sem nenhum adicional
            drawLine(currentAngle);
            
            // 2. Calcula o ponto exato sobre a linha onde o hexágono deve estar
            const hexPosition = getPointOnLine(relativePos, currentAngle);
            
            // 3. Desenha o HEXÁGONO branco, com orientação PARALELA à linha (baseAngle = currentAngle)
            // e girando sobre si mesmo (rotação própria)
            drawHexagonParallel(hexPosition.x, hexPosition.y, hexSize, currentAngle, hexRotation);
            
            // Verificação de integridade: 
            // - hexágono NUNCA ultrapassa os limites da linha porque relativePos ∈ [-halfLen, halfLen]
            // - A velocidade translacional é harmônica, mesma frequência da gangorra, logo não avança nem atrasa
            // - Não há elementos adicionais, sem corda, sem nós, sem efeitos visuais extras.
        }
        
        // ========== ANIMAÇÃO ==========
        function animate(timestamp) {
            if (startTime === null) {
                startTime = timestamp;
            }
            const elapsedSeconds = (timestamp - startTime) / 1000;
            drawFrame(elapsedSeconds);
            animationId = requestAnimationFrame(animate);
        }
        
        // Iniciar animação
        animationId = requestAnimationFrame(animate);
        
        // Prevenir interações que possam causar seleção ou contexto
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());
        canvas.addEventListener('selectstart', (e) => e.preventDefault());
        
        // Limpeza suave
        window.addEventListener('beforeunload', () => {
            if (animationId) cancelAnimationFrame(animationId);
        });
        
        // Mensagem de confirmação silenciosa
        console.log('✅ Gangorra ativa | Hexágono paralelo à linha | movimento sincronizado');
    })();
</script>
</body>
</html>
