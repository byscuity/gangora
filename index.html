<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hexágono Sobre a Linha - Alta Velocidade e Giro Acelerado</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', monospace;
        }

        canvas {
            display: block;
            margin: 0 auto;
            background: #000000;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.15);
            border-radius: 4px;
        }

        .info {
            position: fixed;
            bottom: 12px;
            right: 12px;
            color: #ffaa33;
            font-size: 9px;
            font-family: 'Courier New', monospace;
            background: rgba(0,0,0,0.7);
            padding: 4px 10px;
            border-radius: 16px;
            backdrop-filter: blur(2px);
            pointer-events: none;
            letter-spacing: 0.5px;
            font-weight: bold;
        }
        
        .badge {
            position: fixed;
            bottom: 12px;
            left: 12px;
            color: #88ffaa;
            font-size: 8px;
            font-family: monospace;
            background: rgba(0,0,0,0.6);
            padding: 3px 10px;
            border-radius: 14px;
            pointer-events: none;
            font-weight: 500;
        }
        
        .speed-tag {
            position: fixed;
            top: 12px;
            right: 12px;
            color: #ff8866;
            font-size: 10px;
            font-family: monospace;
            background: rgba(0,0,0,0.65);
            padding: 4px 12px;
            border-radius: 20px;
            pointer-events: none;
            backdrop-filter: blur(2px);
            font-weight: bold;
        }
    </style>
</head>
<body>
<canvas id="canvas" width="1000" height="500"></canvas>
<div class="info">⚡ HEXÁGONO VELOZ | GIRO ACELERADO | PERCURSO UNIFORME ALTA VELOCIDADE ⚡</div>
<div class="badge">⟁ movimento rápido | rotação intensificada | acima da linha sempre</div>
<div class="speed-tag">🔺 VELOCIDADE ALTA | SPIN TURBO</div>

<script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // DIMENSÕES FIXAS
        const W = 1000;
        const H = 500;
        canvas.width = W;
        canvas.height = H;

        // PONTO CENTRAL DA GANGORRA (linha reta)
        const pivotX = W / 2;
        const pivotY = H / 2;
        
        // COMPRIMENTO TOTAL DA LINHA (branca)
        const lineLength = 480;          // pixels
        const halfLen = lineLength / 2;   // 240
        
        // ========== PARÂMETROS DA GANGORRA (oscilação suave) ==========
        const angularSpeed = 1.85;        // rad/s -> velocidade angular da oscilação da linha
        const tiltAmplitude = 0.44;       // radianos ≈ 25.2 graus
        
        // ========== PARÂMETROS DO HEXÁGONO ==========
        const hexRadius = 22;              // raio do hexágono
        const perpendicularOffset = 20;    // distância fixa ACIMA da linha
        
        // *** AUMENTOS SOLICITADOS ***
        // Velocidade do hexágono aumentada SIGNIFICATIVAMENTE (antes ~195 px/s)
        // Agora usamos um fator de 2.8x mais rápido para tornar o movimento vibrante e dinâmico
        const speedMultiplier = 2.85;      // aumento agressivo da velocidade linear
        const baseMaxTipSpeed = tiltAmplitude * angularSpeed * halfLen;  // ~195.36 px/s
        const hexLinearSpeed = baseMaxTipSpeed * speedMultiplier;        // ≈ 556 px/s !!!
        
        // Giro do hexágono AUMENTADO (antes 2.6 rad/s)
        const hexSpinRate = 6.8;            // rotação própria MUITO mais rápida (rad/s) → giro turbo
        
        // ================================================================
        // MOVIMENTO UNIFORME DO HEXÁGONO (VELOCIDADE CONSTANTE ALTA)
        // O hexágono percorre toda a extensão da linha de forma uniforme,
        // alternando entre as extremidades com alta velocidade.
        // Para manter o movimento sincronizado visualmente, aumentamos a velocidade
        // linear de forma que o hexágono atravessa a linha rapidamente, criando
        // um efeito dinâmico e enérgico, com giro próprio acelerado.
        // ----------------------------------------------------------------
        
        // Estado do movimento uniforme (ping-pong entre as extremidades)
        let posAlongLine = -halfLen;      // começa na extremidade esquerda
        let movingForward = true;          // direção atual
        
        // ========== CONTROLE DE TEMPO ==========
        let lastTimestamp = null;
        let globalTime = 0;
        let animationId = null;
        
        // Estado da gangorra (ângulo instantâneo)
        let currentTiltAngle = 0;
        // Rotação própria do hexágono (acumulativa - giro aumentado)
        let hexSpinAngle = 0;
        
        // ========== FUNÇÕES GEOMÉTRICAS PRECISAS ==========
        
        /**
         * Desenha a linha principal (gangorra) com traço nítido
         */
        function drawGangorraLine(angleRad) {
            const cosA = Math.cos(angleRad);
            const sinA = Math.sin(angleRad);
            const dx = halfLen * cosA;
            const dy = halfLen * sinA;
            
            const x1 = pivotX - dx;
            const y1 = pivotY - dy;
            const x2 = pivotX + dx;
            const y2 = pivotY + dy;
            
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = '#FFFFFF';
            ctx.lineWidth = 3.2;
            ctx.shadowBlur = 0;
            ctx.stroke();
            
            // Extremidades com brilho sutil (estético)
            ctx.beginPath();
            ctx.arc(x1, y1, 2.8, 0, Math.PI * 2);
            ctx.fillStyle = '#dddddd';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x2, y2, 2.8, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(pivotX, pivotY, 2.4, 0, Math.PI * 2);
            ctx.fillStyle = '#f0f0f0';
            ctx.fill();
        }
        
        /**
         * Retorna coordenadas de um ponto sobre a linha com base no parâmetro s (-halfLen a +halfLen)
         */
        function getPointOnLine(s, angleRad) {
            const dirX = Math.cos(angleRad);
            const dirY = Math.sin(angleRad);
            return {
                x: pivotX + s * dirX,
                y: pivotY + s * dirY
            };
        }
        
        /**
         * Calcula posição ACIMA da linha (deslocamento perpendicular)
         * A normal escolhida mantém o hexágono sempre sobre a linha, sem contato.
         */
        function getAbovePoint(basePoint, angleRad, offset) {
            // Vetor normal que aponta para o lado "acima" (semiplano superior visual)
            const normX = Math.sin(angleRad);
            const normY = -Math.cos(angleRad);
            return {
                x: basePoint.x + normX * offset,
                y: basePoint.y + normY * offset
            };
        }
        
        /**
         * Desenha hexágono com rotação própria acelerada e alinhamento com a linha
         */
        function drawHexagon(cx, cy, radius, lineAngle, selfRot) {
            const totalRotation = lineAngle + selfRot;
            const sides = 6;
            ctx.beginPath();
            for (let i = 0; i < sides; i++) {
                const angleStep = (i * Math.PI * 2 / sides) + totalRotation;
                const x = cx + radius * Math.cos(angleStep);
                const y = cy + radius * Math.sin(angleStep);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.fillStyle = '#FFFFFF';
            ctx.fill();
            // contorno sutil para definição
            ctx.strokeStyle = '#555555';
            ctx.lineWidth = 0.8;
            ctx.stroke();
            
            // efeito adicional: pequeno brilho central (ponto de energia)
            ctx.beginPath();
            ctx.arc(cx, cy, 3, 0, Math.PI * 2);
            ctx.fillStyle = '#ffcc44';
            ctx.shadowBlur = 6;
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        /**
         * Atualiza posição do hexágono com VELOCIDADE CONSTANTE ALTA (uniforme)
         * Percorre toda linha rapidamente com movimento ping-pong suave
         */
        function updateUniformLinearMotion(deltaSec) {
            if (deltaSec <= 0 || deltaSec > 0.05) deltaSec = 0.016;
            
            const step = hexLinearSpeed * deltaSec;
            
            if (movingForward) {
                posAlongLine += step;
                if (posAlongLine >= halfLen) {
                    posAlongLine = halfLen;
                    movingForward = false;
                }
            } else {
                posAlongLine -= step;
                if (posAlongLine <= -halfLen) {
                    posAlongLine = -halfLen;
                    movingForward = true;
                }
            }
            
            // Clamp seguro contra erro numérico
            posAlongLine = Math.min(halfLen, Math.max(-halfLen, posAlongLine));
        }
        
        /**
         * Função principal de animação - Loop otimizado com alta performance
         */
        function animationLoop(nowMs) {
            if (!lastTimestamp) {
                lastTimestamp = nowMs;
                globalTime = 0;
                requestAnimationFrame(animationLoop);
                return;
            }
            
            let delta = Math.min(0.033, (nowMs - lastTimestamp) / 1000);
            if (delta <= 0) delta = 0.016;
            lastTimestamp = nowMs;
            
            // Tempo global acumulado para movimentos contínuos
            globalTime += delta;
            
            // 1. Atualiza ângulo da gangorra (oscilação suave)
            currentTiltAngle = tiltAmplitude * Math.sin(angularSpeed * globalTime);
            
            // 2. Movimento uniforme do hexágono com velocidade ALTA (aumentada)
            updateUniformLinearMotion(delta);
            
            // 3. Rotação própria do hexágono - GIRO ACELERADO (aumentado de 2.6 para 6.8 rad/s)
            hexSpinAngle = hexSpinRate * globalTime;
            
            // 4. Obtém ponto base na linha conforme posição atual
            const basePt = getPointOnLine(posAlongLine, currentTiltAngle);
            
            // 5. Posição final do hexágono com offset perpendicular "acima"
            const hexagonCenter = getAbovePoint(basePt, currentTiltAngle, perpendicularOffset);
            
            // 6. RENDERIZAÇÃO COMPLETA
            ctx.clearRect(0, 0, W, H);
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, W, H);
            
            // Desenha linha branca (gangorra)
            drawGangorraLine(currentTiltAngle);
            
            // Desenha o hexágono com giro acelerado e acima da linha
            drawHexagon(hexagonCenter.x, hexagonCenter.y, hexRadius, currentTiltAngle, hexSpinAngle);
            
            // Efeito visual dinâmico opcional: rastro de velocidade? apenas para sensação.
            // Mantemos o minimalista mas com giro intenso visível.
            
            animationId = requestAnimationFrame(animationLoop);
        }
        
        // ========== INICIALIZAÇÃO COM PARÂMETROS AUMENTADOS ==========
        function startAnimation() {
            if (animationId) cancelAnimationFrame(animationId);
            lastTimestamp = null;
            globalTime = 0;
            posAlongLine = -halfLen;
            movingForward = true;
            currentTiltAngle = 0;
            hexSpinAngle = 0;
            animationId = requestAnimationFrame(animationLoop);
        }
        
        startAnimation();
        
        // Prevenção de interações e eventos indesejados
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());
        canvas.addEventListener('selectstart', (e) => e.preventDefault());
        
        window.addEventListener('beforeunload', () => {
            if (animationId) cancelAnimationFrame(animationId);
        });
        
        // Exibição dos novos parâmetros no console para validação
        console.log('⚡⚡⚡ VELOCIDADE E GIRO AUMENTADOS ⚡⚡⚡');
        console.log('🚀 HEXÁGONO - Velocidade linear UNIFORME aumentada para:', hexLinearSpeed.toFixed(2), 'px/s');
        console.log('   (Multiplicador de velocidade =', speedMultiplier, 'x em relação à velocidade base da ponta da gangorra)');
        console.log('🔄 Rotação própria (spin) aumentada para:', hexSpinRate, 'rad/s → efeito turbo!');
        console.log('📏 Extensão da linha:', lineLength, 'px | halfLen:', halfLen);
        console.log('⏱️ Tempo de travessia de uma extremidade à outra com NOVA velocidade: ~', (lineLength / hexLinearSpeed).toFixed(2), 'segundos');
        console.log('✨ Hexágono percorre toda linha uniformemente com giro acelerado e velocidade superior.');
        console.log('🔺 Posicionamento: ACIMA da linha (offset perpendicular =', perpendicularOffset, 'px)');
        
        // Adiciona pequeno efeito de estilo para exibir status no hover indireto
        const style = document.createElement('style');
        style.textContent = `
            canvas {
                transition: filter 0.2s;
            }
            canvas:hover {
                filter: drop-shadow(0 0 4px rgba(255,200,100,0.3));
            }
        `;
        document.head.appendChild(style);
    })();
</script>
</body>
</html>
