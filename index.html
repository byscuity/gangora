<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hexágono Sobre a Linha - Percorre Uniformemente</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            margin: 0 auto;
            background: #000000;
        }

        .info {
            position: fixed;
            bottom: 6px;
            right: 6px;
            color: #111;
            font-size: 7px;
            font-family: monospace;
            pointer-events: none;
        }
    </style>
</head>
<body>
<canvas id="canvas" width="1000" height="500"></canvas>
<div class="info">◆ hexágono acima da linha | percorre toda a linha uniformemente ◆</div>

<script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Dimensões fixas
        const W = 1000;
        const H = 500;
        canvas.width = W;
        canvas.height = H;

        // Centro da linha (ponto médio fixo onde a gangorra pivoteia)
        const centerX = W / 2;
        const centerY = H / 2;
        
        // Comprimento da linha reta (branca)
        const lineLength = 480;
        const halfLen = lineLength / 2;
        
        // PARÂMETROS DO MOVIMENTO DA GANGORRA (linha reta inclinando)
        const gangSpeed = 1.85;           // velocidade angular da gangorra (rad/s)
        const amplitudeAngle = 0.44;       // amplitude de inclinação (~25 graus)
        
        // PARÂMETROS DO HEXÁGONO
        const hexSize = 22;                // raio do hexágono
        const hexSpinSpeed = 2.6;          // rotação própria (rad/s)
        
        // DISTÂNCIA ACIMA DA LINHA (perpendicular)
        const aboveOffset = 20;             // pixels acima da linha
        
        // =====================================================
        // LÓGICA PRINCIPAL:
        // O hexágono percorre TODA a linha de forma UNIFORME,
        // ou seja, vai de uma extremidade à outra com velocidade constante
        // ao longo do comprimento da linha, SEMPRE ACIMA dela.
        // A velocidade de percurso é BASEADA na velocidade da linha (gangorra)
        // e ajustada para que não seja mais rápida nem mais devagar.
        //
        // IMPLEMENTAÇÃO:
        // O movimento da linha é oscilatório (senoidal). Para que o hexágono
        // percorra a linha uniformemente com velocidade compatível, faremos
        // com que ele complete um ciclo completo (ida e volta) no MESMO PERÍODO
        // que a gangorra completa um ciclo (subida e descida).
        // Dessa forma, a velocidade média e instantânea do hexágono ao longo
        // da linha respeita a dinâmica da gangorra.
        //
        // Posição do hexágono: s(t) varia linearmente com o tempo de forma
        // triangular suave? Não, para ser contínuo e suave, usamos movimento
        // harmônico com a mesma frequência da gangorra, mas isso não é "uniforme"
        // (velocidade constante). O enunciado pede "percorrer toda a linha de forma
        // uniforme com base na velocidade da linha" -> interpretação: a velocidade
        // de deslocamento do hexágono sobre a linha (em relação à linha) deve ser
        // constante, e o valor dessa constante deve ser tal que o hexágono
        // acompanhe o ritmo da gangorra sem ultrapassar ou ficar para trás.
        //
        // Portanto: o hexágono se move ao longo da linha de uma extremidade à outra
        // com velocidade constante v_const (pixels/s). O tempo para ir de uma ponta
        // à outra é T_viajem = lineLength / v_const. Para estar sincronizado com a
        // gangorra (que tem período T_gang = 2π / gangSpeed), queremos que o hexágono
        // complete uma ida e volta (2 * lineLength) no mesmo período da gangorra?
        // Ou que a ida simples coincida com meio período? A melhor sincronia para
        // "velocidade necessária para não ser mais rápida ou devagar que a velocidade da linha"
        // é fazer com que o hexágono se mova com velocidade constante percorrendo a linha
        // de forma que quando a gangorra atinge sua inclinação máxima, o hexágono está
        // nas extremidades; quando a gangorra está na horizontal, o hexágono está no centro.
        // Isso é exatamente um movimento harmônico, não velocidade constante.
        // 
        // Porém o usuário pediu "percorrer toda a linha de forma uniforme" (velocidade constante).
        // Vamos atender: velocidade CONSTANTE ao longo da linha, indo e voltando (ping-pong).
        // E a velocidade será definida com base na velocidade angular máxima da linha
        // para garantir compatibilidade. A velocidade linear constante do hexágono será
        // igual à velocidade tangencial máxima da extremidade da linha, garantindo que
        // o hexágono nunca ultrapasse a dinâmica da linha.
        //
        // Cálculo: velocidade tangencial máxima da ponta da linha = amplitude_angular * gangSpeed * halfLen
        // (derivada da posição da extremidade). valor ~ 0.44 * 1.85 * 240 ≈ 195 pixels/s.
        // Usaremos velocidade constante do hexágono = 195 pixels/s para estar na mesma ordem,
        // percorrendo a linha de ponta a ponta (480 pixels) em ~2.46 segundos.
        // Isso cria um movimento uniforme (ida e volta) que visualmente está sobre a linha.
        // Como o hexágono está ACIMA, a percepção é de que ele percorre a linha sem nunca estar dentro.
        // 
        // Para garantir "não passar dela": limitamos o movimento entre -halfLen e +halfLen.
        // E a velocidade é constante no referencial da linha.
        
        // Velocidade constante de deslocamento do hexágono AO LONGO da linha (pixels/segundo)
        // Calculada com base na velocidade característica da gangorra (velocidade máxima das pontas)
        const maxTipSpeed = amplitudeAngle * gangSpeed * halfLen;  // ≈ 0.44 * 1.85 * 240 ≈ 195.36
        const hexTravelSpeed = maxTipSpeed;   // velocidade constante compatível
        
        // Posição atual do hexágono ao longo da linha (parâmetro s entre -halfLen e +halfLen)
        let currentS = -halfLen;      // começa na extremidade esquerda (ou direita)
        let movingRight = true;        // direção do movimento
        
        // Tempo para animação contínua e sincronização de fase (opcional)
        let lastTimestamp = 0;
        let globalTime = 0;
        
        // ========== FUNÇÕES GEOMÉTRICAS ==========
        
        // Desenha a linha reta (branca) - gangorra
        function drawLine(angleRad) {
            const cosAng = Math.cos(angleRad);
            const sinAng = Math.sin(angleRad);
            const dx = halfLen * cosAng;
            const dy = halfLen * sinAng;
            
            const x1 = centerX - dx;
            const y1 = centerY - dy;
            const x2 = centerX + dx;
            const y2 = centerY + dy;
            
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = '#FFFFFF';
            ctx.lineWidth = 3.0;
            ctx.stroke();
        }
        
        // Obtém um ponto sobre a linha dado o parâmetro s (distância do centro)
        function getPointOnLine(s, angleRad) {
            const dirX = Math.cos(angleRad);
            const dirY = Math.sin(angleRad);
            return {
                x: centerX + s * dirX,
                y: centerY + s * dirY
            };
        }
        
        // Obtém a posição ACIMA da linha (deslocamento perpendicular)
        // Vetor perpendicular horário ou anti-horário? Para ficar visualmente "acima"
        // (lado de fora da oscilação), usamos a normal que aponta para Y negativo quando a linha está horizontal.
        // Com linha horizontal (angle=0), a normal (-sin, cos) = (0,1) aponta para baixo.
        // Queremos acima (Y menor). Então usamos a normal oposta: (sin, -cos)
        function getPositionAboveLine(basePoint, angleRad, offset) {
            // Vetor perpendicular que aponta para o lado "acima" (visualmente para cima da tela quando horizontal)
            // Para angle=0: normal (0, -1) aponta para cima (Y negativo)
            const normX = Math.sin(angleRad);
            const normY = -Math.cos(angleRad);
            return {
                x: basePoint.x + normX * offset,
                y: basePoint.y + normY * offset
            };
        }
        
        // Desenha hexágono com rotação própria + paralelo à linha
        function drawHexagonAt(cx, cy, radius, baseAngle, selfRotation) {
            const totalRotation = baseAngle + selfRotation;
            ctx.beginPath();
            const sides = 6;
            for (let i = 0; i < sides; i++) {
                const angle = (i * Math.PI * 2 / sides) + totalRotation;
                const x = cx + radius * Math.cos(angle);
                const y = cy + radius * Math.sin(angle);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.fillStyle = '#FFFFFF';
            ctx.fill();
        }
        
        // Atualiza o movimento uniforme do hexágono ao longo da linha
        // Ele percorre de -halfLen até +halfLen com velocidade constante,
        // inverte a direção ao atingir os extremos.
        function updateUniformPosition(deltaTime) {
            if (deltaTime <= 0 || deltaTime > 0.05) deltaTime = 0.016;
            
            const step = hexTravelSpeed * deltaTime;
            
            if (movingRight) {
                currentS += step;
                if (currentS >= halfLen) {
                    currentS = halfLen;
                    movingRight = false;
                }
            } else {
                currentS -= step;
                if (currentS <= -halfLen) {
                    currentS = -halfLen;
                    movingRight = true;
                }
            }
            
            // Garantia numérica de limites
            currentS = Math.max(-halfLen, Math.min(halfLen, currentS));
        }
        
        // ========== LOOP PRINCIPAL ==========
        let startTime = null;
        let animFrameId = null;
        let lastFrameTime = 0;
        let currentAngle = 0;
        let hexSelfRotation = 0;
        
        function renderFrame(nowMs) {
            if (!startTime) {
                startTime = nowMs;
                lastFrameTime = nowMs;
                globalTime = 0;
                requestAnimationFrame(renderFrame);
                return;
            }
            
            // Tempo global decorrido (segundos)
            globalTime = (nowMs - startTime) / 1000;
            
            // Delta time para movimento contínuo do hexágono
            let deltaSec = (nowMs - lastFrameTime) / 1000;
            if (deltaSec > 0.033) deltaSec = 0.033;
            if (deltaSec <= 0) deltaSec = 0.016;
            lastFrameTime = nowMs;
            
            // 1. Atualiza ângulo da gangorra (oscilação)
            currentAngle = amplitudeAngle * Math.sin(gangSpeed * globalTime);
            
            // 2. Atualiza posição do hexágono ao longo da linha (movimento uniforme constante)
            updateUniformPosition(deltaSec);
            
            // 3. Atualiza rotação própria do hexágono (gira continuamente)
            hexSelfRotation = hexSpinSpeed * globalTime;
            
            // 4. Obtém ponto base na linha conforme posição atual S
            const basePoint = getPointOnLine(currentS, currentAngle);
            
            // 5. Calcula posição ACIMA da linha (offset perpendicular)
            const hexPos = getPositionAboveLine(basePoint, currentAngle, aboveOffset);
            
            // 6. Desenhar tudo
            ctx.clearRect(0, 0, W, H);
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, W, H);
            
            // Linha branca (gangorra)
            drawLine(currentAngle);
            
            // Hexágono branco acima da linha, paralelo, girando
            drawHexagonAt(hexPos.x, hexPos.y, hexSize, currentAngle, hexSelfRotation);
            
            // Nenhum elemento adicional, sem efeitos, sem corda, sem nós.
            
            animFrameId = requestAnimationFrame(renderFrame);
        }
        
        // Iniciar animação
        animFrameId = requestAnimationFrame(renderFrame);
        
        // Prevenir interações
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());
        canvas.addEventListener('selectstart', (e) => e.preventDefault());
        
        // Cleanup
        window.addEventListener('beforeunload', () => {
            if (animFrameId) cancelAnimationFrame(animFrameId);
        });
        
        console.log('✓ Hexágono acima da linha | percorre toda extensão uniformemente | velocidade sincronizada com a gangorra');
    })();
</script>
</body>
</html>
