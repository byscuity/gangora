<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gangorra - Hexágono na Ponta Mais Alta</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            margin: 0 auto;
            background: #000000;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.03);
        }

        .info {
            position: fixed;
            bottom: 10px;
            right: 10px;
            color: #151515;
            font-size: 9px;
            font-family: monospace;
            pointer-events: none;
        }
    </style>
</head>
<body>
<canvas id="canvas" width="1000" height="500"></canvas>
<div class="info">▲ linha-gangorra | hexágono na ponta mais alta ▲</div>

<script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Dimensões fixas
        const W = 1000;
        const H = 500;
        canvas.width = W;
        canvas.height = H;

        // Centro da linha (pivô da gangorra)
        const centerX = W / 2;
        const centerY = H / 2;
        
        // Comprimento da linha reta
        const lineLength = 460;
        const halfLen = lineLength / 2;
        
        // Parâmetros da gangorra (movimento mais rápido)
        const gangSpeed = 2.1;           // velocidade angular (rad/s)
        const amplitudeAngle = 0.45;     // amplitude de inclinação (~25.8 graus)
        
        // Parâmetros do hexágono
        const hexSize = 26;               // raio do hexágono
        const hexSpinSpeed = 3.0;         // rotação própria (rad/s)
        
        // Para controle de tempo
        let startTime = null;
        let animationId = null;
        
        // Estado atual
        let currentAngle = 0;             // ângulo atual da linha
        let hexRotation = 0;              // rotação intrínseca do hexágono
        
        // ====== FUNÇÃO PARA IDENTIFICAR A PONTA MAIS ALTA DA LINHA ======
        // Dada a linha com centro em (centerX, centerY), inclinação angle,
        // as duas extremidades são:
        //   ponta1 = (centerX + halfLen*cos(angle), centerY + halfLen*sin(angle))
        //   ponta2 = (centerX - halfLen*cos(angle), centerY - halfLen*sin(angle))
        // A ponta mais alta é a que tem o menor Y (pois Y cresce para baixo no canvas)
        // Retorna as coordenadas (x, y) da extremidade superior e também um vetor
        // que indica a direção para cima (normal à linha, apontando para cima)
        function getHigherExtremity(angleRad) {
            const cosAng = Math.cos(angleRad);
            const sinAng = Math.sin(angleRad);
            
            // Extremidade 1 (direção +)
            const x1 = centerX + halfLen * cosAng;
            const y1 = centerY + halfLen * sinAng;
            
            // Extremidade 2 (direção -)
            const x2 = centerX - halfLen * cosAng;
            const y2 = centerY - halfLen * sinAng;
            
            // A ponta mais alta é a que tem menor Y (pois Y=0 é o topo)
            if (y1 < y2) {
                return { x: x1, y: y1 };
            } else {
                return { x: x2, y: x2 };
            }
        }
        
        // Versão corrigida: retorna a extremidade com menor Y (mais alta)
        function getHigherTip(angleRad) {
            const cosAng = Math.cos(angleRad);
            const sinAng = Math.sin(angleRad);
            
            const x1 = centerX + halfLen * cosAng;
            const y1 = centerY + halfLen * sinAng;
            const x2 = centerX - halfLen * cosAng;
            const y2 = centerY - halfLen * sinAng;
            
            if (y1 <= y2) {
                return { x: x1, y: y1 };
            } else {
                return { x: x2, y: y2 };
            }
        }
        
        // ====== FUNÇÃO PARA POSICIONAR HEXÁGONO ACIMA DA PONTA ======
        // Queremos o hexágono "acima" da linha: significa que ele deve ser deslocado
        // perpendicularmente à linha, para o lado que aponta para cima (externo à gangorra)
        // A "ponta mais alta" já é o ponto extremo. Para ficar "acima" da linha, 
        // deslocamos o hexágono na direção da normal que aponta para fora da linha,
        // mais precisamente na direção que se afasta do centro da linha para cima.
        // 
        // Cálculo da normal "para cima": o vetor perpendicular à linha.
        // Vetor direção da linha: (cos(angle), sin(angle))
        // Vetor normal (girado 90° anti-horário): (-sin(angle), cos(angle))
        // Porém esse normal pode apontar para cima ou para baixo. Precisamos escolher
        // aquele que, somado à extremidade, faz o hexágono ficar VISIVELMENTE acima 
        // (ou seja, mais próximo do topo da tela) mantendo a sensação de "sobre a ponta".
        // 
        // Como a ponta já é a mais alta, deslocar na direção da normal que aponta 
        // para cima (Y negativo) vai posicionar o hexágono exatamente acima da extremidade.
        // Escolhemos o sinal da normal comparando o produto escalar com o vetor (0, -1).
        function getHexagonPositionAboveTip(angleRad) {
            const tip = getHigherTip(angleRad);
            
            // Vetor direção da linha
            const dirX = Math.cos(angleRad);
            const dirY = Math.sin(angleRad);
            
            // Vetor normal (perpendicular) - duas opções
            const normal1x = -dirY;
            const normal1y = dirX;
            const normal2x = dirY;
            const normal2y = -dirX;
            
            // Queremos o normal que aponta mais para cima (Y negativo)
            // Calculamos o produto escalar com o vetor (0, -1) [cima]
            const upY = -1;
            const dot1 = normal1y * upY;   // pois (0,-1) dot normal = normal.y * -1? Vamos simplificar:
            // Na verdade queremos a normal que tenha a componente Y mais negativa (aponta para cima)
            // Basta escolher entre normal1y e normal2y o que for menor (mais negativo)
            let normalX, normalY;
            if (normal1y < normal2y) {
                normalX = normal1x;
                normalY = normal1y;
            } else {
                normalX = normal2x;
                normalY = normal2y;
            }
            
            // Distância do hexágono em relação à ponta (um pequeno offset para ficar "acima" sem tocar)
            // Para ficar "acima da linha" sem penetrar, deslocamos por uma distância igual ao raio do hexágono
            // + um pequeno espaçamento para dar leveza visual. Como a linha tem espessura 3, usamos offset = hexSize * 0.85
            const offsetDistance = hexSize * 0.9;
            
            const hexX = tip.x + normalX * offsetDistance;
            const hexY = tip.y + normalY * offsetDistance;
            
            return { x: hexX, y: hexY };
        }
        
        // Desenha a linha reta (gangorra) - branca pura
        function drawLine(angleRad) {
            const cosAng = Math.cos(angleRad);
            const sinAng = Math.sin(angleRad);
            
            const dx = halfLen * cosAng;
            const dy = halfLen * sinAng;
            
            const x1 = centerX - dx;
            const y1 = centerY - dy;
            const x2 = centerX + dx;
            const y2 = centerY + dy;
            
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = '#FFFFFF';
            ctx.lineWidth = 3.2;
            ctx.stroke();
        }
        
        // Desenha o hexágono branco com rotação
        // O hexágono deve GIRAR continuamente (rotação própria) 
        // e também pode ter uma orientação base (paralela ou não, mas para manter estética,
        // vamos deixar ele girando livremente sem orientação fixa, apenas sobre a ponta)
        // Conforme solicitado: "hexágono branco girando" e "acima da linha" e "na ponta mais alta"
        // Não há exigência de paralelismo agora, apenas que esteja acima e na ponta.
        function drawHexagon(cx, cy, radius, rotation) {
            ctx.beginPath();
            const sides = 6;
            for (let i = 0; i < sides; i++) {
                const angleRad = rotation + (i * Math.PI * 2 / sides);
                const x = cx + radius * Math.cos(angleRad);
                const y = cy + radius * Math.sin(angleRad);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.fillStyle = '#FFFFFF';
            ctx.fill();
        }
        
        // Atualiza o movimento da gangorra e rotação do hexágono
        function updateMotion(seconds) {
            // Ângulo da linha oscilando (gangorra)
            currentAngle = amplitudeAngle * Math.sin(gangSpeed * seconds);
            // Rotação contínua do hexágono
            hexRotation = hexSpinSpeed * seconds;
        }
        
        // Função principal de desenho
        function drawFrame(seconds) {
            if (!ctx) return;
            
            // Fundo preto
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, W, H);
            
            // Atualizar ângulo da linha e rotação
            updateMotion(seconds);
            
            // 1. Desenhar a linha reta (gangorra)
            drawLine(currentAngle);
            
            // 2. Posicionar o hexágono na ponta mais alta da linha, acima dela
            const hexPos = getHexagonPositionAboveTip(currentAngle);
            
            // 3. Desenhar hexágono branco girando
            drawHexagon(hexPos.x, hexPos.y, hexSize, hexRotation);
            
            // Sutil verificação de limite (apenas para garantia conceitual)
            // Nenhum elemento extra adicionado.
        }
        
        // ========== ANIMAÇÃO ==========
        function animate(timestamp) {
            if (startTime === null) {
                startTime = timestamp;
            }
            const elapsedSeconds = (timestamp - startTime) / 1000;
            drawFrame(elapsedSeconds);
            animationId = requestAnimationFrame(animate);
        }
        
        // Iniciar
        animationId = requestAnimationFrame(animate);
        
        // Prevenir interações
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());
        canvas.addEventListener('selectstart', (e) => e.preventDefault());
        
        window.addEventListener('beforeunload', () => {
            if (animationId) cancelAnimationFrame(animationId);
        });
        
        console.log('✓ Gangorra ativa | Hexágono na ponta mais alta e acima da linha');
    })();
</script>
</body>
</html>
