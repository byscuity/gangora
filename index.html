<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Linha Gangorra + Hexágono Giratório</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: black;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: system-ui, 'Segoe UI', monospace;
        }

        canvas {
            display: block;
            margin: 0 auto;
            box-shadow: 0 0 0 2px rgba(255,255,255,0.05);
            background: black;
            cursor: none;
        }

        /* Nenhum elemento adicional, apenas canvas puro */
    </style>
</head>
<body>
<canvas id="canvas" width="1200" height="600"></canvas>

<script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Dimensões fixas (linha reta horizontal, mas com movimento de gangorra)
        const w = 1200;
        const h = 600;
        canvas.width = w;
        canvas.height = h;

        // --- Parâmetros da LINHA (GANGORRA) ---
        // A linha será uma linha reta (sem curvas, sem corda, sem efeitos decorativos)
        // Seu movimento: inclinação alternada como uma gangorra, mantendo sempre o formato de linha reta.
        // Centro da linha: ponto médio do canvas (x = w/2, y = h/2)
        const lineCenterX = w / 2;
        const lineCenterY = h / 2;
        
        // Comprimento total da linha (reta)
        const lineLength = 480;  // suficiente para hexágono percorrer ponta a ponta
        
        // Ângulo de inclinação da gangorra (varia no tempo)
        let angle = 0;          // radianos, 0 = horizontal
        let angleVelocity = 0.9; // velocidade de oscilação (rad/s)
        let time = 0;
        
        // Parâmetros do movimento da gangorra: alterna suavemente entre -maxAngle e +maxAngle
        const maxAngle = Math.PI / 7;  // ~25.7 graus (inclinação visível mas sem exageros)
        
        // --- Parâmetros do HEXÁGONO ---
        // Raio do hexágono (distância do centro a cada vértice)
        const hexRadius = 28;
        
        // Posição do hexágono ao longo da linha: parâmetro t de 0 a 1
        // 0 = extremidade esquerda (ou início conforme orientação da linha)
        // 1 = extremidade direita (ou fim)
        let t = 0;            // começa na ponta esquerda
        let direction = 1;    // 1 = indo da esquerda pra direita, -1 = da direita pra esquerda
        let speed = 0.45;     // velocidade de deslocamento (unidades de t por segundo) 
        
        // Ângulo de rotação do hexágono (gira continuamente)
        let hexRotation = 0;
        const rotationSpeed = 2.4;  // radianos por segundo (gira rapidamente)
        
        // Armazenar os 6 vértices do hexágono (coordenadas locais centradas em 0,0)
        function getHexagonVertices(radius) {
            const verts = [];
            for (let i = 0; i < 6; i++) {
                const angleStep = (Math.PI * 2 / 6) * i; // hexágono regular vértices
                const x = radius * Math.cos(angleStep);
                const y = radius * Math.sin(angleStep);
                verts.push({x, y});
            }
            return verts;
        }
        
        const hexLocalVerts = getHexagonVertices(hexRadius);
        
        // Função para obter as coordenadas das extremidades da linha (baseado no ângulo atual)
        // A linha é um segmento de reta com comprimento 'lineLength', centrado em (lineCenterX, lineCenterY)
        // Orientação: vetor direção unitário rotacionado pelo ângulo 'currentAngle'
        function getLineEndpoints(currentAngleRad) {
            const dirX = Math.cos(currentAngleRad);
            const dirY = Math.sin(currentAngleRad);
            const halfLen = lineLength / 2;
            const p1 = {
                x: lineCenterX - dirX * halfLen,
                y: lineCenterY - dirY * halfLen
            };
            const p2 = {
                x: lineCenterX + dirX * halfLen,
                y: lineCenterY + dirY * halfLen
            };
            return { p1, p2 };
        }
        
        // Dado um parâmetro t [0,1], retorna a posição exata na linha reta (com a gangorra atual)
        function getPointOnLine(tParam, currentAngleRad) {
            const { p1, p2 } = getLineEndpoints(currentAngleRad);
            // interpolação linear entre p1 e p2
            return {
                x: p1.x + (p2.x - p1.x) * tParam,
                y: p1.y + (p2.y - p1.y) * tParam
            };
        }
        
        // Atualização da física a cada frame
        let lastTimestamp = null;
        
        function update(deltaTime) {
            if (deltaTime > 0.05) deltaTime = 0.05; // segurança
            
            // 1) Movimento da gangorra: oscilação senoidal
            time += deltaTime;
            // Ângulo seguindo movimento harmônico: angle = maxAngle * sin(freq * time)
            const freq = angleVelocity; // rad/s
            angle = maxAngle * Math.sin(freq * time);
            
            // 2) Movimento do hexágono ao longo da linha (ponta a ponta)
            // Atualiza t conforme direção e velocidade
            let step = speed * deltaTime;
            t += direction * step;
            
            // Checagem de extremidades (quando atinge 0 ou 1, inverte direção)
            if (t >= 1.0) {
                t = 1.0;
                direction = -1;
            } else if (t <= 0.0) {
                t = 0.0;
                direction = 1;
            }
            
            // 3) Rotação contínua do hexágono
            hexRotation += rotationSpeed * deltaTime;
            // manutenção dentro de 2pi não necessária mas elegante
            if (hexRotation > Math.PI * 2) hexRotation -= Math.PI * 2;
        }
        
        // Função para desenhar uma linha reta (sem textura, sem pontas decorativas, sem corda)
        function drawLine(currentAngleRad) {
            const { p1, p2 } = getLineEndpoints(currentAngleRad);
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.strokeStyle = "white";
            ctx.lineWidth = 3.5;       // linha nítida, sem efeitos adicionais
            ctx.lineCap = "butt";       // sem arredondamento ou enfeites
            ctx.stroke();
        }
        
        // Desenha o hexágono branco girando, em cima da posição atual na linha
        function drawHexagonOnLine(currentAngleRad, tValue, currentRotation) {
            // Obtém posição central do hexágono sobre a linha (gangorra no ângulo atual)
            const center = getPointOnLine(tValue, currentAngleRad);
            
            // Desenha o hexágono (puro, sem bordas adicionais, sem preenchimento extra)
            // Usaremos fill + stroke branco para contornos nítidos, sem sombras ou efeitos.
            // O pedido: "hexágono branco" -> vou interpretar como contorno e preenchimento branco sólido.
            // mas para manter a estética minimalista e fiel: hexágono branco significa preenchimento branco e
            // também bordas brancas, sem outras cores. Para garantir visibilidade sobre fundo preto,
            // preencher com branco e borda branca fica perfeito (sem outros efeitos).
            ctx.beginPath();
            // transforma os vértices locais aplicando rotação e depois translação
            const cosRot = Math.cos(currentRotation);
            const sinRot = Math.sin(currentRotation);
            for (let i = 0; i < hexLocalVerts.length; i++) {
                const v = hexLocalVerts[i];
                // rotaciona vértice em torno de (0,0)
                const rotatedX = v.x * cosRot - v.y * sinRot;
                const rotatedY = v.x * sinRot + v.y * cosRot;
                const finalX = center.x + rotatedX;
                const finalY = center.y + rotatedY;
                if (i === 0) ctx.moveTo(finalX, finalY);
                else ctx.lineTo(finalX, finalY);
            }
            ctx.closePath();
            
            // Hexágono branco sólido (sem gradientes ou texturas)
            ctx.fillStyle = "white";
            ctx.fill();
            // Contorno branco para garantir definição (mas mantendo tudo branco)
            ctx.strokeStyle = "white";
            ctx.lineWidth = 1.8;
            ctx.stroke();
        }
        
        // Animação principal
        function animate(nowMs) {
            if (!lastTimestamp) {
                lastTimestamp = nowMs;
                requestAnimationFrame(animate);
                return;
            }
            
            let delta = Math.min(0.033, (nowMs - lastTimestamp) / 1000);
            if (delta <= 0) {
                lastTimestamp = nowMs;
                requestAnimationFrame(animate);
                return;
            }
            
            // Atualizar lógica
            update(delta);
            
            // Limpar canvas (fundão preto sem nenhuma imagem residual)
            ctx.clearRect(0, 0, w, h);
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, w, h);
            
            // --- Desenhar linha reta (GANGORA) com inclinação atual ---
            drawLine(angle);
            
            // --- Desenhar hexágono giratório percorrendo a linha ---
            drawHexagonOnLine(angle, t, hexRotation);
            
            lastTimestamp = nowMs;
            requestAnimationFrame(animate);
        }
        
        // Iniciar animação
        requestAnimationFrame(animate);
        
        // Pequeno ajuste de responsividade para garantir proporção (mas canvas fixo)
        window.addEventListener('resize', () => {});
        
        // Explicação silenciosa: nenhum elemento extra, linha reta com movimento de gangorra pura,
        // hexágono branco girando e se movendo de ponta a ponta sem nunca sair da linha reta.
        // A linha não é uma corda, não há texturas, efeitos, partículas ou adornos.
    })();
</script>
</body>
</html>
