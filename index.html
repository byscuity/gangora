<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hexágono Sobre a Linha - Movimento Uniforme Sincronizado</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', monospace;
        }

        canvas {
            display: block;
            margin: 0 auto;
            background: #000000;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.1);
            border-radius: 4px;
        }

        .info {
            position: fixed;
            bottom: 12px;
            right: 12px;
            color: #2a2a2a;
            font-size: 9px;
            font-family: 'Courier New', monospace;
            background: rgba(0,0,0,0.6);
            padding: 4px 8px;
            border-radius: 12px;
            backdrop-filter: blur(2px);
            pointer-events: none;
            letter-spacing: 0.3px;
            font-weight: 500;
        }
        
        .badge {
            position: fixed;
            bottom: 12px;
            left: 12px;
            color: #333;
            font-size: 8px;
            font-family: monospace;
            background: rgba(10,10,10,0.5);
            padding: 3px 8px;
            border-radius: 12px;
            pointer-events: none;
        }
    </style>
</head>
<body>
<canvas id="canvas" width="1000" height="500"></canvas>
<div class="info">⚡ HEXÁGONO | VELOCIDADE UNIFORME SOBRE A LINHA | ACIMA PERMANENTEMENTE ⚡</div>
<div class="badge">⟁ movimento natural | sincronia angular | percurso contínuo</div>

<script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // DIMENSÕES FIXAS
        const W = 1000;
        const H = 500;
        canvas.width = W;
        canvas.height = H;

        // PONTO CENTRAL DA GANGORRA (linha reta)
        const pivotX = W / 2;
        const pivotY = H / 2;
        
        // COMPRIMENTO TOTAL DA LINHA (branca) -> distância entre extremidades
        const lineLength = 480;          // pixels
        const halfLen = lineLength / 2;   // = 240
        
        // ========== PARÂMETROS DINÂMICOS DA GANGORRA (oscilação suave) ==========
        const angularSpeed = 1.85;        // rad/s -> velocidade angular da oscilação
        const tiltAmplitude = 0.44;       // radianos ≈ 25.2 graus (inclinação máxima)
        
        // ========== PARÂMETROS DO HEXÁGONO ==========
        const hexRadius = 22;              // raio do hexágono (tamanho visual)
        const hexSpinRate = 2.6;           // rotação própria contínua (rad/s)
        const perpendicularOffset = 20;    // distância fixa ACIMA da linha (offset perpendicular)
        
        // ================================================================
        // MOVIMENTO UNIFORME DO HEXÁGONO AO LONGO DA LINHA (VELOCIDADE CONSTANTE)
        // ESTRATÉGIA:
        // O hexágono percorre toda a extensão da linha de forma absolutamente uniforme,
        // alternando entre as extremidades (ida e volta) como um carrinho sobre trilho.
        // A velocidade escalar do hexágono em relação à linha é CONSTANTE.
        // Para que o movimento seja compatível com a dinâmica da gangorra (sem ultrapassar
        // ou ficar visualmente "descolado"), calculamos a velocidade com base na velocidade
        // tangencial máxima das pontas da linha. Isso garante que o hexágono se mova
        // numa escala temporal harmoniosa, sem ser mais rápido que a rotação da gangorra.
        // ----------------------------------------------------------------
        // Velocidade máxima de uma extremidade da linha (ponta): 
        // V_tip_max = amplitude_angular * velocidade_angular * (comprimento/2)
        // valor ≈ 0.44 * 1.85 * 240 ≈ 195.36 pixels/segundo.
        // Essa velocidade tangencial representa o quão rápido a ponta se move no espaço.
        // Para criar um movimento uniforme realista e estável, definimos a velocidade
        // constante do hexágono como exatamente esse valor máximo de referência.
        // Dessa forma, o hexágono desliza homogeneamente entre -halfLen e +halfLen,
        // invertendo suavemente nos extremos. O período de ida e volta completa 
        // (2 * lineLength) / hexSpeed ≈ 4.91 segundos, enquanto a gangorra completa um 
        // ciclo completo (subida e descida) em T = 2π/1.85 ≈ 3.395s. Isso cria um ritmo
        // visual interessante e absolutamente uniforme, sem acelerações.
        
        const maxTipSpeed = tiltAmplitude * angularSpeed * halfLen;   // ≈ 195.36 px/s
        const hexLinearSpeed = maxTipSpeed;   // velocidade constante do hexágono sobre a linha (px/s)
        
        // Estado do movimento uniforme (ping-pong entre as extremidades)
        let posAlongLine = -halfLen;      // começa na extremidade ESQUERDA (ou direita visual)
        let movingForward = true;          // true = indo para direita (+S), false = indo para esquerda (-S)
        
        // ========== CONTROLE DE TEMPO ==========
        let lastTimestamp = null;
        let globalTime = 0;
        let animationId = null;
        
        // Estado da gangorra (ângulo instantâneo)
        let currentTiltAngle = 0;
        // Rotação própria do hexágono (acumulativa)
        let hexSpinAngle = 0;
        
        // ========== FUNÇÕES GEOMÉTRICAS PRECISAS ==========
        
        /**
         * Desenha a linha principal (gangorra) com estilo clean e espessura visível
         * @param {number} angleRad - ângulo de inclinação da linha (radianos)
         */
        function drawGangorraLine(angleRad) {
            const cosA = Math.cos(angleRad);
            const sinA = Math.sin(angleRad);
            const dx = halfLen * cosA;
            const dy = halfLen * sinA;
            
            const x1 = pivotX - dx;
            const y1 = pivotY - dy;
            const x2 = pivotX + dx;
            const y2 = pivotY + dy;
            
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = '#FFFFFF';
            ctx.lineWidth = 3.2;
            ctx.shadowBlur = 0;
            ctx.stroke();
            
            // Pequeno detalhe sutil: pontos nas extremidades para referência visual
            ctx.beginPath();
            ctx.arc(x1, y1, 2.5, 0, Math.PI * 2);
            ctx.fillStyle = '#aaaaaa';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x2, y2, 2.5, 0, Math.PI * 2);
            ctx.fill();
            // ponto central (pivô) sutil
            ctx.beginPath();
            ctx.arc(pivotX, pivotY, 2.2, 0, Math.PI * 2);
            ctx.fillStyle = '#cccccc';
            ctx.fill();
        }
        
        /**
         * Retorna as coordenadas de um ponto sobre a linha com base no parâmetro s
         * s varia de -halfLen (extremidade "esquerda" referencial) a +halfLen (extremidade direita)
         * @param {number} s - distância orientada a partir do centro
         * @param {number} angleRad - inclinação atual da linha
         */
        function getPointOnLine(s, angleRad) {
            const dirX = Math.cos(angleRad);
            const dirY = Math.sin(angleRad);
            return {
                x: pivotX + s * dirX,
                y: pivotY + s * dirY
            };
        }
        
        /**
         * Calcula a posição perpendicular à linha, deslocada pelo offset "acima".
         * Definição de "acima": visualmente para o lado que fica na parte superior da tela
         * quando a linha está horizontal (ângulo 0). Usamos a normal (sin, -cos) que aponta
         * para cima (Y negativo) na horizontal. Isso mantém o hexágono sempre sobre a linha
         * e não dentro dela, sem contato, garantindo o efeito "acima da linha".
         * @param {object} basePoint - ponto base sobre a linha
         * @param {number} angleRad - inclinação
         * @param {number} offset - distância perpendicular
         */
        function getAbovePoint(basePoint, angleRad, offset) {
            // Vetor normal unitário que aponta para o lado "acima" (lado externo elegante)
            // Para angle = 0: normal = (0, -1) -> aponta para cima (Y menor)
            // Para ângulos positivos, a normal rotaciona de forma consistente, mantendo o hexágono
            // sempre na região que visualmente corresponde ao lado de cima em relação à orientação.
            const normX = Math.sin(angleRad);
            const normY = -Math.cos(angleRad);
            return {
                x: basePoint.x + normX * offset,
                y: basePoint.y + normY * offset
            };
        }
        
        /**
         * Desenha hexágono regular preenchido com rotação própria + orientação da linha
         * @param {number} cx - centro X
         * @param {number} cy - centro Y
         * @param {number} radius - raio circunscrito
         * @param {number} lineAngle - ângulo da linha (para alinhar orientação base)
         * @param {number} selfRot - rotação adicional independente (spin)
         */
        function drawHexagon(cx, cy, radius, lineAngle, selfRot) {
            // Orientação total: o hexágono fica naturalmente "paralelo" à linha
            // somamos a rotação própria para efeito visual de giro contínuo.
            const totalRotation = lineAngle + selfRot;
            const sides = 6;
            ctx.beginPath();
            for (let i = 0; i < sides; i++) {
                const angleStep = (i * Math.PI * 2 / sides) + totalRotation;
                const x = cx + radius * Math.cos(angleStep);
                const y = cy + radius * Math.sin(angleStep);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.fillStyle = '#FFFFFF';
            ctx.shadowBlur = 0;
            ctx.fill();
            // Leve contorno para dar definição (opcional, mas fica clean)
            ctx.strokeStyle = '#222222';
            ctx.lineWidth = 0.8;
            ctx.stroke();
        }
        
        /**
         * Atualiza a posição do hexágono sobre a linha com velocidade CONSTANTE (uniforme)
         * Implementa movimento de vai-e-vem (ping-pong) entre as extremidades.
         * A velocidade escalar (hexLinearSpeed) é fixa em pixels/segundo.
         * Esta função garante que o hexágono percorre TODA a linha uniformemente,
         * sem qualquer aceleração ou variação na velocidade de percurso.
         */
        function updateUniformLinearMotion(deltaSec) {
            if (deltaSec <= 0 || deltaSec > 0.05) deltaSec = 0.016; // fallback seguro
            
            // deslocamento absoluto nesta iteração
            const step = hexLinearSpeed * deltaSec;
            
            if (movingForward) {
                posAlongLine += step;
                if (posAlongLine >= halfLen) {
                    posAlongLine = halfLen;
                    movingForward = false;
                }
            } else {
                posAlongLine -= step;
                if (posAlongLine <= -halfLen) {
                    posAlongLine = -halfLen;
                    movingForward = true;
                }
            }
            
            // clamp duplo para evitar erros de floating point
            posAlongLine = Math.min(halfLen, Math.max(-halfLen, posAlongLine));
        }
        
        /**
         * Função principal de animação (loop baseado em requestAnimationFrame)
         * Atualiza tempo, ângulo da gangorra, movimento uniforme, rotação própria,
         * recalcula posição do hexágono acima da linha e renderiza.
         */
        function animationLoop(nowMs) {
            if (!lastTimestamp) {
                lastTimestamp = nowMs;
                globalTime = 0;
                requestAnimationFrame(animationLoop);
                return;
            }
            
            // Cálculo do delta time seguro (segundos)
            let delta = Math.min(0.033, (nowMs - lastTimestamp) / 1000);
            if (delta <= 0) delta = 0.016;
            lastTimestamp = nowMs;
            
            // Tempo global para animações contínuas (oscilação e rotação)
            globalTime += delta;
            
            // 1. ATUALIZA INCLINAÇÃO DA GANGORRA (movimento oscilatório harmônico puro)
            currentTiltAngle = tiltAmplitude * Math.sin(angularSpeed * globalTime);
            
            // 2. MOVIMENTO UNIFORME DO HEXÁGONO SOBRE A LINHA (VELOCIDADE CONSTANTE)
            //    Percorre toda a extensão de -halfLen até +halfLen e vice-versa, sem aceleração.
            updateUniformLinearMotion(delta);
            
            // 3. ROTAÇÃO PRÓPRIA DO HEXÁGONO (gira continuamente independente da posição)
            hexSpinAngle = hexSpinRate * globalTime;
            
            // 4. OBTÉM PONTO BASE NA LINHA conforme a posição atual (posAlongLine)
            const basePt = getPointOnLine(posAlongLine, currentTiltAngle);
            
            // 5. POSIÇÃO FINAL DO HEXÁGONO: aplica o offset perpendicular "acima da linha"
            const hexagonCenter = getAbovePoint(basePt, currentTiltAngle, perpendicularOffset);
            
            // 6. RENDERIZAÇÃO COMPLETA
            ctx.clearRect(0, 0, W, H);
            // Fundo preto absoluto
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, W, H);
            
            // Desenha a linha branca (gangorra) com detalhes nos extremos
            drawGangorraLine(currentTiltAngle);
            
            // Desenha o hexágono acima, com rotação própria + paralelismo à linha
            drawHexagon(hexagonCenter.x, hexagonCenter.y, hexRadius, currentTiltAngle, hexSpinAngle);
            
            // (Opcional) pequeno ponto de referência sobre o trilho? não, mantém clean.
            // Nenhum elemento extra, apenas hexágono e linha.
            
            // continua o loop
            animationId = requestAnimationFrame(animationLoop);
        }
        
        // ========== INICIALIZAÇÃO E SEGURANÇA ==========
        function startAnimation() {
            if (animationId) cancelAnimationFrame(animationId);
            lastTimestamp = null;
            globalTime = 0;
            posAlongLine = -halfLen;        // inicia na extremidade esquerda
            movingForward = true;            // movimento inicial para a direita
            currentTiltAngle = 0;
            hexSpinAngle = 0;
            animationId = requestAnimationFrame(animationLoop);
        }
        
        startAnimation();
        
        // Previne interações indesejadas
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());
        canvas.addEventListener('selectstart', (e) => e.preventDefault());
        
        // Garantir que a animação não acumule múltiplos loops em situações de visibilidade
        window.addEventListener('beforeunload', () => {
            if (animationId) cancelAnimationFrame(animationId);
        });
        
        // Log de validação das propriedades (console)
        console.log('🚀 Hexágono com movimento UNIFORME sobre a linha | Velocidade constante:', hexLinearSpeed.toFixed(2), 'px/s');
        console.log('   Extensão da linha:', lineLength, 'px | halfLen:', halfLen);
        console.log('   Offset perpendicular acima da linha:', perpendicularOffset, 'px');
        console.log('   Velocidade angular da gangorra:', angularSpeed, 'rad/s | amplitude:', tiltAmplitude, 'rad');
        console.log('   Período de ida/volta completa do hexágono:', (2 * lineLength / hexLinearSpeed).toFixed(2), 's');
        console.log('   Sincronia: movimento uniforme garantido | velocidade baseada em maxTipSpeed');
        
        // Adicional: para fins de demonstração, não há aceleração ou desaceleração.
        // O hexágono percorre de forma perfeitamente linear sobre o eixo da linha.
        
        // Caso necessário: redesenho se houver mudança de tamanho (não aplicável)
        window.addEventListener('resize', () => {
            // canvas tem tamanho fixo, apenas prevenção
            canvas.style.width = '1000px';
            canvas.style.height = '500px';
        });
        
        // Script final: hexágono acima, sem contato com a linha, percurso uniforme absoluto
    })();
</script>
</body>
</html>
